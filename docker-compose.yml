services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btg_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=BTG Pactual Funds API
      - APP_VERSION=1.0.0
      - DEBUG=false
      - MONGODB_URL=mongodb://btg_admin:btg_secure_password_2024@mongodb:27017/btg_funds?authSource=admin
      - DATABASE_NAME=btg_funds
      - SECRET_KEY=btg-pactual-super-secret-key-2024-production
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ALGORITHM=HS256
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - btg_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:7.0
    container_name: btg_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: btg_admin
      MONGO_INITDB_ROOT_PASSWORD: btg_secure_password_2024
      MONGO_INITDB_DATABASE: btg_funds
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - btg_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:latest
    container_name: btg_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: btg_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: btg_secure_password_2024
      ME_CONFIG_MONGODB_URL: mongodb://btg_admin:btg_secure_password_2024@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - btg_network

volumes:
  mongodb_data:

networks:
  btg_network:
    driver: bridge
